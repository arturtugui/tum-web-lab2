# PagesCMS Configuration for Mobila Orhei

media: astro-project/public/images

content:
  # Setari generale
  - name: config
    label: Setari generale
    path: astro-project/src/data/config.json
    type: file
    fields:
      - name: title
        label: Titlu Tab Browser
        type: string
      - name: description
        label: Descriere (pentru meta tags)
        type: string
      - name: keywords
        label: Cuvinte-cheie (descriptoare SEO)
        type: string

  # Header
  - name: header
    label: Secțiune de navigare
    path: astro-project/src/data/header.json
    type: file
    fields:
      - name: company-name
        label: Nume Companie
        type: string

  # ── Kitchen Projects (optional) ───────────────────
  - name: kitchens
    label: Proiecte Bucătării
    path: astro-project/src/content/products
    filename: "{fields.slug}.md"
    type: collection
    fields:
      - name: title
        label: Nume Proiect
        type: string
      - name: slug
        label: Slug (ID)
        type: string
      - name: image
        label: Imagine Proiect
        type: image
      - name: description
        label: Descriere
        type: rich-text
      - name: price
        label: Preț (MDL)
        type: string
      - name: features
        label: Caracteristici
        type: rich-text
