# PagesCMS Configuration for Mobila Orhei
# Docs: https://pagescms.org/docs/configuration

media: astro-project/public/images/uploads

content:
  # ── Homepage (Main Page) ──────────────────────────
  - name: home
    label: Pagina Principală
    path: astro-project/src/content/pages
    filename: home.md
    type: file # single file, not collection
    fields:
      - name: title
        label: Titlu Site
        type: string
      - name: description
        label: Meta Description (SEO)
        type: string
      - name: hero_heading
        label: Hero - Titlu Principal
        type: string
      - name: hero_subheading
        label: Hero - Subtitlu
        type: string
      - name: hero_cta_label
        label: Hero - Buton CTA
        type: string
      - name: hero_cta_url
        label: Hero - Link Buton
        type: string
      - name: services_heading
        label: Servicii - Titlu
        type: string
      - name: services_description
        label: Servicii - Descriere
        type: rich-text
      - name: kitchens_heading
        label: Bucătării - Titlu
        type: string
      - name: kitchens_description
        label: Bucătării - Descriere
        type: rich-text
      - name: furniture_heading
        label: Mobilă - Titlu
        type: string
      - name: furniture_description
        label: Mobilă - Descriere
        type: rich-text
      - name: footer_text
        label: Footer - Text
        type: string

  # ── Kitchen Projects (optional) ───────────────────
  - name: kitchens
    label: Proiecte Bucătării
    path: astro-project/src/content/products
    filename: "{fields.slug}.md"
    type: collection
    fields:
      - name: title
        label: Nume Proiect
        type: string
      - name: slug
        label: Slug (ID)
        type: string
      - name: image
        label: Imagine Proiect
        type: image
      - name: description
        label: Descriere
        type: rich-text
      - name: price
        label: Preț (MDL)
        type: string
      - name: features
        label: Caracteristici
        type: rich-text

  # ── Services (optional) ───────────────────────────
  - name: services_items
    label: Servicii
    path: astro-project/src/content/services
    filename: "{fields.slug}.md"
    type: collection
    fields:
      - name: title
        label: Nume Serviciu
        type: string
      - name: slug
        label: Slug
        type: string
      - name: icon
        label: Icon (emoji/image)
        type: string
      - name: description
        label: Descriere
        type: rich-text
      - name: price_info
        label: Info preț/condiții
        type: string
