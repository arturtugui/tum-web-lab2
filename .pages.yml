# PagesCMS Configuration for Mobila Orhei

media: astro-project/public/images

content:
  # Setari generale
  - name: config
    label: Setari generale
    path: astro-project/src/data/config.json
    type: file
    fields:
      - name: title
        label: Titlu Tab Browser
        type: string
      - name: description
        label: Descriere (pentru meta tags)
        type: string
      - name: keywords
        label: Cuvinte-cheie (descriptoare SEO)
        type: string

  # Header
  - name: header
    label: Secțiune de navigare
    path: astro-project/src/data/header.json
    type: file
    fields:
      - name: company-name
        label: Nume Companie
        type: string

    # Services
  - name: services
    label: Servicii
    path: astro-project/src/data/services.json
    type: file
    fields:
      - name: heading
        label: Titlu Secțiune
        type: string
      - name: items
        label: Lista Servicii
        type: array
        view:
          fields: [title, description, icon]
        fields:
          - { name: title, label: "Titlu Serviciu", type: string }
          - { name: slug, label: "Slug (ID)", type: string }
          - { name: icon, label: "Icon (fa-class)", type: string }
          - { name: description, label: "Descriere", type: text }

  # ── Kitchen Projects (optional) ───────────────────
  - name: kitchens
    label: Proiecte Bucătării
    path: astro-project/src/content/products
    filename: "{fields.slug}.md"
    type: collection
    fields:
      - name: title
        label: Nume Proiect
        type: string
      - name: slug
        label: Slug (ID)
        type: string
      - name: image
        label: Imagine Proiect
        type: image
      - name: description
        label: Descriere
        type: rich-text
      - name: price
        label: Preț (MDL)
        type: string
      - name: features
        label: Caracteristici
        type: rich-text
