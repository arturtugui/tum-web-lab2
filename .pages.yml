# PagesCMS Configuration for Mobila Orhei

media: astro-project/public/images

content:
  # ── Setari generale ──────────────────────────
  - name: config
    label: Setari generale
    path: astro-project/src/content/config/config.md # ← Full file path
    type: file
    fields:
      - name: title
        label: Titlu Tab Browser
        type: string

  # ── Kitchen Projects (optional) ───────────────────
  - name: kitchens
    label: Proiecte Bucătării
    path: astro-project/src/content/products
    filename: "{fields.slug}.md"
    type: collection
    fields:
      - name: title
        label: Nume Proiect
        type: string
      - name: slug
        label: Slug (ID)
        type: string
      - name: image
        label: Imagine Proiect
        type: image
      - name: description
        label: Descriere
        type: rich-text
      - name: price
        label: Preț (MDL)
        type: string
      - name: features
        label: Caracteristici
        type: rich-text

  # ── Services (optional) ───────────────────────────
  - name: services_items
    label: Servicii
    path: astro-project/src/content/services
    filename: "{fields.slug}.md"
    type: collection
    fields:
      - name: title
        label: Nume Serviciu
        type: string
      - name: slug
        label: Slug
        type: string
      - name: icon
        label: Icon (emoji/image)
        type: string
      - name: description
        label: Descriere
        type: rich-text
      - name: price_info
        label: Info preț/condiții
        type: string
